<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bailiff - Mock Trial Timer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Playfair+Display:wght@600;700;800&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">

    <meta property="og:title" content="Bailiff - Mock Trial Timer">
    <meta property="og:description" content="A streamlined, high-visibility mock trial timekeeping utility designed for speed and reliability">
    <meta property="og:image" content="https://chaos142.github.io/Bailiff/banner.png?v=2">
    <meta property="og:type" content="website">

    <meta name="twitter:card" content="summary_large_image">
</head>
<body>

    <div class="court-bar"></div>

    <header>
        <div class="court-emblem">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M7 20l10 0"/>
                <path d="M6 6l6 -1l6 1"/>
                <path d="M12 3l0 17"/>
                <path d="M9 12l-3 -6l-3 6a3 3 0 0 0 6 0"/>
                <path d="M21 12l-3 -6l-3 6a3 3 0 0 0 6 0"/>
            </svg>
        </div>
        <h1>Bailiff</h1>
        <p class="court-subtitle">Mock Trial Timer</p>
        <div class="byline">
            Created by <span>Josh Felder</span>
            <a href="https://github.com/Chaos142" target="_blank">GitHub</a>
        </div>
    </header>

    <div class="team-row">
        <div class="input-group">
            <label for="p-name">Plaintiff / Prosecution</label>
            <input type="text" id="p-name" placeholder="e.g. Brown">
        </div>
        <div class="vs">vs.</div>
        <div class="input-group">
            <label for="d-name">Defense</label>
            <input type="text" id="d-name" placeholder="e.g. Board of Education">
        </div>
    </div>

    <div class="toggle-container">
        <label for="advanced-toggle" class="toggle-switch">
            <input type="checkbox" id="advanced-toggle">
            <span class="toggle-slider"></span>
        </label>
        <label for="advanced-toggle">Advanced Objection Mode</label>
    </div>

    <div class="panel-container">
        <div class="court-panel">
            <div class="panel-header">
                <button id="add-block-btn">+ Add Block</button>
            </div>

            <div id="block-edit-panel" class="block-edit-panel hidden">
                <h3>Edit Block</h3>
                <div class="edit-fields">
                    <label>Name<input type="text" id="edit-block-name"></label>
                    <label>Time<input type="text" id="edit-block-time"></label>
                    <label id="link-label">
                        Link to:
                        <select id="edit-block-link">
                            <option value="">None</option>
                        </select>
                    </label>
                </div>
                <div class="edit-actions">
                    <button id="save-block-btn">Save Changes</button>
                    <button id="cancel-edit-btn">Cancel</button>
                </div>
            </div>

            <div id="block-list" class="block-list"></div>
        </div>
    </div>

    <div class="start-trial-container">
        <button id="start-trial-btn">Start Trial</button>
    </div>
    <script src="setup.js"></script>
</body>
</html>
